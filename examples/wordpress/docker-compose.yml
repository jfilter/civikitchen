# CiviCRM on WordPress — quickstart
# docker compose up -d
# CiviCRM/WP: http://localhost:8080  (admin / admin)
# phpMyAdmin: http://localhost:8081
# Maildev:    http://localhost:1080

services:
  civicrm:
    image: ghcr.io/jfilter/civicrm-dev:wordpress
    depends_on:
      db:
        condition: service_started
    ports:
      - "8080:80"
    environment:
      CIVICRM_DB_HOST: db
      CIVICRM_DB_ROOT_PASSWORD: root
      CIVIKITCHEN_SITE_URL: "http://localhost:8080"
      # The :wordpress and :drupal10 tags share the same image — only the
      # default civibuild site type differs. Setting it explicitly here makes
      # the example self-documenting.
      CIVICRM_SITE_TYPE: wp-demo

  db:
    image: mariadb:10.11
    environment:
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect"]
      interval: 10s
      timeout: 5s
      retries: 5

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    depends_on:
      - db
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db

  maildev:
    image: maildev/maildev:latest
    ports:
      - "1080:1080"
      - "1025:1025"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:1080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  db-data:
