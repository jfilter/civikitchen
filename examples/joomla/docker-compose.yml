# CiviCRM on Joomla — quickstart
# docker compose up -d
# CiviCRM/Joomla: http://localhost:8080  (admin / admin)
# phpMyAdmin:    http://localhost:8081
# Maildev:       http://localhost:1080

services:
  app:
    image: ${IMAGE:-ghcr.io/jfilter/civikitchen:joomla}
    pull_policy: always
    depends_on:
      db:
        condition: service_started
    ports:
      - "8080:80"
    environment:
      CIVICRM_DB_HOST: db
      CIVICRM_DB_ROOT_PASSWORD: root
      CIVIKITCHEN_SITE_URL: "http://localhost:8080"
      # The Joomla image uses civicrm-buildkit's CiviCRM Joomla demo template.
      CIVICRM_SITE_TYPE: joomla-demo
      # Enable extensions you bind-mount below (comma-separated keys):
      # CIVIKITCHEN_ENABLE_EXTENSIONS: myextension
    # Mount your extension under development. NOTE: on the buildkit CMS
    # flavors the extension dir is the CMS extensionsDir, NOT
    # /var/www/html/ext (that path is standalone-only). For this image:
    # volumes:
    #   - ../path/to/myextension:/home/buildkit/buildkit/build/site/web/media/civicrm/ext/myextension

  db:
    image: mariadb:10.11
    environment:
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect"]
      interval: 10s
      timeout: 5s
      retries: 5

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    depends_on:
      - db
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db

  maildev:
    image: maildev/maildev:latest
    ports:
      - "1080:1080"
      - "1025:1025"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:1080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  db-data:
