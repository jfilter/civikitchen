# GitHub Actions workflow for a CiviCRM extension repo, using civikitchen.
#
# Copy into your extension repo as .github/workflows/civicrm-tests.yml,
# together with docker-compose.ci.yml and db-init/ from this directory.
# Replace `myextension` with your extension key (workflow + compose file).
name: CiviCRM tests

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  phpunit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Boot CiviCRM (civikitchen standalone)
        run: docker compose -f docker-compose.ci.yml up -d --pull always

      # The app has no healthcheck of its own — poll the login page, which
      # only serves once the first-boot auto-install has finished. Generous
      # budget (10 min): the auto composer install for a mounted extension
      # with a large lock file runs before the install.
      - name: Wait for the auto-install
        run: |
          for _ in $(seq 1 120); do
            if curl -fs http://localhost:8080/civicrm/login >/dev/null; then
              echo "ready"; exit 0
            fi
            sleep 5
          done
          echo "site never became reachable" >&2
          docker compose -f docker-compose.ci.yml logs app
          exit 1

      # vendor/ is installed automatically on container start when your
      # extension ships a composer.json (CIVIKITCHEN_AUTO_COMPOSER=1 default).
      - name: Enable the extension
        run: docker compose -f docker-compose.ci.yml exec -T app cv ext:enable myextension

      # CIVICRM_UF=UnitTests runs against the isolated <db>_test scratch
      # database the image configured at install — not the dev site. Prefers
      # the extension's own vendor/bin/phpunit (from its lock file) over the
      # image-global phpunit 9.
      - name: Run headless phpunit
        run: |
          docker compose -f docker-compose.ci.yml exec -T -e CIVICRM_UF=UnitTests app \
            bash -c "cd /var/www/html/ext/myextension && { [ -x vendor/bin/phpunit ] && vendor/bin/phpunit || phpunit; }"

      - name: Logs on failure
        if: failure()
        run: docker compose -f docker-compose.ci.yml logs app

  # Optional: also test against CMS flavors (Drupal 10/11, WordPress, Joomla).
  # Uncomment this job and copy docker-compose.ci-cms.yml into your repo.
  # Each flavor mounts the extension at its own CiviCRM extensionsDir
  # (CK_EXT_BASE), and the dev images carry a HEALTHCHECK so --wait blocks
  # until the first-boot civibuild reinstall is done.
