# CiviCRM Standalone — extension development quickstart
#
# 1. Point the volume below at your extension repo (uncomment).
# 2. docker compose up -d
#    On first start the app container runs cv core:install and creates a demo
#    login user (admin / admin) — open http://localhost:8080 and log in.
# 3. (If your extension uses composer) install vendor deps:
#      docker compose exec app bash -c "cd /var/www/html/ext/myextension && composer install"
# 4. Enable + test:
#      docker compose exec app cv ext:enable myextension
#      docker compose exec app bash -c "cd /var/www/html/ext/myextension && phpunit"
#
# Tools in the image: cv, civix, composer, node/npm, phpunit, phpstan, phpcs
# (drupal/coder + dealerdirect installer), pcov, xdebug (opt-in via XDEBUG_MODE).
#
# URLs:
#   CiviCRM:    http://localhost:8080
#   phpMyAdmin: http://localhost:8081
#   Maildev:    http://localhost:1080

services:
  app:
    # Override via `IMAGE=... docker compose up` (used by CI to test a
    # locally-built tag). Defaults to the published GHCR tag.
    image: ${IMAGE:-ghcr.io/jfilter/civicrm-dev:standalone}
    # The :standalone tag is updated on every push to main and monthly to pick
    # up upstream patches. Always pull on `up` so a stale local copy doesn't
    # mask entrypoint/install fixes.
    pull_policy: always
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:80"
    environment:
      CIVICRM_AUTO_INSTALL: "1"
      CIVICRM_DB_HOST: db
      CIVICRM_DB_NAME: civicrm
      CIVICRM_DB_USER: civicrm
      CIVICRM_DB_PASSWORD: civicrm
      # Must match the host:port you open in the browser. CiviCRM bakes this
      # into every asset URL — a mismatch silently breaks the Angular UI.
      SITE_URL: "http://localhost:8080"
      # Auto-create a login user after install. Defaults: pass=admin,
      # email=admin@example.org. Unset CIVICRM_DEMO_USER to skip.
      CIVICRM_DEMO_USER: admin
      # The image enables all standard Civi components by default
      # (CiviEvent, CiviContribute, CiviMember, CiviMail, CiviPledge, CiviCase,
      # CiviReport, CiviCampaign). Override with CIVICRM_COMPONENTS to narrow
      # the set; pass an empty string to keep only the core component.
      # Point Civi's mailer at the maildev sidecar (UI on :1080). Outbound
      # mail from Civi (mailings, notifications, password resets) lands in
      # maildev instead of being silently dropped.
      CIVICRM_SMTP_HOST: maildev
      CIVICRM_SMTP_PORT: "1025"
      # Comma-separated extension keys downloaded + enabled after install
      # (e.g. de.systopia.xcm,de.systopia.twingle). Supports key@URL for
      # pinned / forked releases. Empty by default; set the env var in your
      # shell or a .env file alongside this compose file.
      CIVICRM_EXTRA_EXTENSIONS: "${CIVICRM_EXTRA_EXTENSIONS:-}"
    # volumes:
    #   - ../path/to/your/extension:/var/www/html/ext/myextension

  db:
    image: mariadb:10.11
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: civicrm
      MYSQL_USER: civicrm
      MYSQL_PASSWORD: civicrm
    volumes:
      - db-data:/var/lib/mysql
      - ./db-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 10

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    depends_on:
      - db
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db

  maildev:
    image: maildev/maildev:latest
    ports:
      - "1080:1080"
      - "1025:1025"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:1080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  db-data:
