# CiviCRM Standalone — extension development quickstart
#
# 1. Point the volume below at your extension repo (uncomment).
# 2. docker compose up -d
#    On first start the app container runs cv core:install automatically.
# 3. Enable + test:
#      docker compose exec app cv ext:enable myextension
#      docker compose exec app bash -c "cd /var/www/html/ext/myextension && phpunit"
#
# Tools in the image: cv, civix, phpunit, phpstan, pcov
#
# URLs:
#   CiviCRM:    http://localhost:8080
#   phpMyAdmin: http://localhost:8081
#   Maildev:    http://localhost:1080

services:
  app:
    image: ghcr.io/jfilter/civicrm-dev:standalone
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:80"
    environment:
      CIVICRM_AUTO_INSTALL: "1"
      CIVICRM_DB_HOST: db
      CIVICRM_DB_NAME: civicrm
      CIVICRM_DB_USER: civicrm
      CIVICRM_DB_PASSWORD: civicrm
    # volumes:
    #   - ../path/to/your/extension:/var/www/html/ext/myextension

  db:
    image: mariadb:10.11
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: civicrm
      MYSQL_USER: civicrm
      MYSQL_PASSWORD: civicrm
    volumes:
      - db-data:/var/lib/mysql
      - ./db-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 10

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    depends_on:
      - db
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db

  maildev:
    image: maildev/maildev:latest
    ports:
      - "1080:1080"
      - "1025:1025"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:1080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  db-data:
