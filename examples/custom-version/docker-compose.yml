# CiviCRM on a CUSTOM / OLDER version — baked LOCALLY via civibuild, not pulled
# from Docker Hub.
#
# Use this when you need a CiviCRM version the published images don't offer:
#  - the official civicrm/civicrm image only goes back to ~6.0, and
#  - Standalone only exists from ~5.69,
# so to mirror an older production server (e.g. taz prod = CiviCRM 5.78.2 on
# Drupal 10 / PHP 8.1) you build the image yourself.
#
# This stack builds civikitchen's buildkit image with `civibuild --civi-ver`,
# using the Drupal 10 civibuild site type — the right fit for modern older
# installs such as CiviCRM 5.78.x. Older pre-Drupal-10 CiviCRM versions should
# switch to a Drupal 9 / 7 civibuild site type. No reliance on any prebuilt
# civicrm/civicrm image.
#
#   # first run builds the image (~10-15 min: civibuild downloads CMS + Civi)
#   CIVICRM_VERSION=5.78.2 docker compose up -d --build
#   # later runs reuse the built image (drop --build)
#
#   CiviCRM:    http://localhost:8080   (admin / admin)
#   Maildev:    http://localhost:1080
#
# Override CIVICRM_VERSION (any tag/branch civibuild can fetch) and PHP_VERSION
# to match your target server. For CiviCRM older than ~5.47 (pre-Drupal-10),
# switch DEFAULT_SITE_TYPE to a Drupal 9 / 7 civibuild type and lower PHP_VERSION.

# Distinct compose project name (rather than the CWD-derived default, e.g.
# 'standalone') so parallel civikitchen examples don't collide on container
# names / networks.
name: civikitchen-custom-version

services:
  app:
    # Tag the locally-built image so later `up` (without --build) reuses it,
    # and other stacks (e.g. your extension repo) can reference the same tag.
    image: civikitchen:drupal10-${CIVICRM_VERSION:-5.78.2}
    build:
      context: ../../images
      dockerfile: buildkit/Dockerfile
      args:
        PHP_VERSION: ${PHP_VERSION:-8.1}
        DEFAULT_SITE_TYPE: drupal10-demo
        CIVICRM_VERSION: ${CIVICRM_VERSION:-5.78.2}
    depends_on:
      db:
        condition: service_started
    ports:
      - "8080:80"
    environment:
      CIVICRM_DB_HOST: db
      CIVICRM_DB_ROOT_PASSWORD: root
      CIVIKITCHEN_SITE_URL: "http://localhost:8080"   # must match the port mapping
      CIVIKITCHEN_SMTP_HOST: maildev                  # outbound mail → maildev UI
      # Download + enable extensions from the registry (comma-separated keys,
      # or key@URL for a pinned release):
      # CIVIKITCHEN_EXTRA_EXTENSIONS: de.systopia.xcm
      # Enable extensions you bind-mount below (comma-separated keys):
      # CIVIKITCHEN_ENABLE_EXTENSIONS: myextension
    # Mount your extension under development. NOTE: on the buildkit CMS
    # flavor the extension dir is the CMS extensionsDir, NOT /var/www/html/ext
    # (that path is standalone-only). For this drupal10 image it is:
    # volumes:
    #   - ../../../path/to/myextension:/home/buildkit/buildkit/build/site/web/sites/default/files/civicrm/ext/myextension

  db:
    image: mariadb:10.11
    environment:
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect"]
      interval: 10s
      timeout: 5s
      retries: 5

  maildev:
    image: maildev/maildev:latest
    ports:
      - "1080:1080"
      - "1025:1025"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:1080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  db-data:
