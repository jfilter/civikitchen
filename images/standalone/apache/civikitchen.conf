# civikitchen Apache vhost config additions for the standalone dev image.
#
# Redirect bare-/ to /civicrm/login. CiviCRM's standaloneusers extension
# returns 403 for anonymous users hitting /civicrm/home (the default landing
# page), which makes a freshly-installed dev image confusing — the user
# opens http://localhost:8080/ and sees "Forbidden" instead of a login form.
#
# This is standard vhost-level landing-page configuration (the upstream
# civicrm/civicrm image leaves it up to the deployer). Logged-in users still
# pass through fine: /civicrm/login detects an active session and bounces
# them on to the dashboard.
RedirectMatch 302 ^/$ /civicrm/login
