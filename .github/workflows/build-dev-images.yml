name: Build Dev Images

on:
  push:
    branches: [main]
    paths:
      - 'images/**'
  schedule:
    # Monthly on the 1st: pick up upstream civicrm/civicrm patch releases.
    # Floating tags (`latest`, `6.12`) make this enough — every run rebuilds
    # against the current latest patch of each tracked minor.
    - cron: '0 6 1 * *'
  workflow_dispatch:

env:
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/civikitchen

jobs:
  build-standalone:
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        version: [latest, '6.12']
        arch: [arm64, amd64]
        include:
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Test-then-promote: builds push only sha-suffixed candidate tags. The
      # stable tags (:standalone, :standalone-latest, ...) are created by
      # promote-standalone AFTER the smoke + e2e tests pass, so a broken image
      # never goes live under a stable tag.
      - name: Build and push standalone candidate image
        uses: docker/build-push-action@v5
        with:
          context: images
          file: images/standalone/Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          build-args: |
            CIVICRM_VERSION=${{ matrix.version }}
          tags: |
            ${{ env.IMAGE_PREFIX }}:standalone-${{ matrix.version }}-${{ github.sha }}-${{ matrix.arch }}
          cache-from: type=gha,scope=standalone-${{ matrix.version }}-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=standalone-${{ matrix.version }}-${{ matrix.arch }}

  merge-standalone:
    needs: build-standalone
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        version: [latest, '6.12']

    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-platform candidate manifest
        run: |
          docker buildx imagetools create -t ${{ env.IMAGE_PREFIX }}:standalone-${{ matrix.version }}-${{ github.sha }} \
            ${{ env.IMAGE_PREFIX }}:standalone-${{ matrix.version }}-${{ github.sha }}-arm64 \
            ${{ env.IMAGE_PREFIX }}:standalone-${{ matrix.version }}-${{ github.sha }}-amd64

  smoke-test-standalone:
    needs: merge-standalone
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: read

    strategy:
      matrix:
        version: [latest, '6.12']
        platform: [linux/arm64, linux/amd64]
        include:
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
          - platform: linux/amd64
            runner: ubuntu-24.04

    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout (for the dev-tools test script)
        uses: actions/checkout@v4

      - name: Functional test of bundled dev tools
        run: |
          IMG=${{ env.IMAGE_PREFIX }}:standalone-${{ matrix.version }}-${{ github.sha }}
          docker pull --platform ${{ matrix.platform }} "$IMG"
          docker run --rm --platform ${{ matrix.platform }} \
            -v "${{ github.workspace }}/images/test:/civikitchen-test:ro" \
            --entrypoint='' \
            "$IMG" \
            bash /civikitchen-test/test-dev-tools.sh

  e2e-test-standalone:
    # Runs the example compose stack and exercises the auto-installed site
    # with Playwright (real Chromium). Catches install/Apache/SITE_URL bugs
    # the in-image functional test can't see.
    needs: smoke-test-standalone
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # The example compose uses `image: ${IMAGE:-…default}` so we point it
      # at this run's candidate tag (stable tags don't exist yet at this point).
      - name: Boot the example stack
        env:
          IMAGE: ${{ env.IMAGE_PREFIX }}:standalone-latest-${{ github.sha }}
          # Exercise the CIVIKITCHEN_EXTRA_EXTENSIONS entrypoint hook with both
          # supported syntaxes:
          # - bare key (mjwshared): pulled from the public registry, exercises
          #   ext:download's network + cache refresh path.
          # - key@URL (de.systopia.xcm): exercises the explicit-URL path. This
          #   one previously regressed because cv ext:download auto-installs
          #   and bombed with "Cannot install or enable extension"; the
          #   entrypoint now splits download (--no-install) + enable.
          CIVIKITCHEN_EXTRA_EXTENSIONS: "mjwshared,de.systopia.xcm@https://github.com/systopia/de.systopia.xcm/releases/download/1.13.0/de.systopia.xcm-1.13.0.zip"
        run: |
          docker compose -f examples/standalone/docker-compose.yml up -d --pull always

      - name: Wait for CiviCRM to install + boot
        run: |
          for i in $(seq 1 60); do
            if curl -fs http://localhost:8080/civicrm/login >/dev/null; then
              echo "ready"
              exit 0
            fi
            sleep 3
          done
          echo "site never became reachable" >&2
          docker compose -f examples/standalone/docker-compose.yml logs app
          exit 1

      - name: Verify CIVIKITCHEN_EXTRA_EXTENSIONS got installed
        run: |
          # Both the bare-key (mjwshared) and key@URL (de.systopia.xcm)
          # entries from CIVIKITCHEN_EXTRA_EXTENSIONS must end up installed.
          for key in mjwshared de.systopia.xcm; do
            status=$(docker compose -f examples/standalone/docker-compose.yml exec -T app \
              runuser -u www-data -- cv api4 Extension.get \
              "{\"where\":[[\"key\",\"=\",\"${key}\"]],\"select\":[\"status\"]}" \
              --out=json)
            echo "${key}: ${status}"
            echo "$status" | grep -Eq '"status"[[:space:]]*:[[:space:]]*"installed"' \
              || { echo "FAIL: ${key} not installed" >&2; exit 1; }
          done

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Playwright + Chromium
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Run Playwright e2e
        env:
          CIVICRM_BASE_URL: http://localhost:8080
        run: npx playwright test

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: App container logs on failure
        if: failure()
        run: docker compose -f examples/standalone/docker-compose.yml logs app

      - name: Tear down
        if: always()
        run: docker compose -f examples/standalone/docker-compose.yml down -v

  promote-standalone:
    # Stable tags only move once the candidate passed smoke + e2e.
    # `imagetools create` from an existing manifest list copies it intact,
    # so the promoted tag stays multi-arch.
    needs: [smoke-test-standalone, e2e-test-standalone]
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        version: [latest, '6.12']

    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Promote tested candidate to stable tags
        run: |
          docker buildx imagetools create -t ${{ env.IMAGE_PREFIX }}:standalone-${{ matrix.version }} \
            ${{ env.IMAGE_PREFIX }}:standalone-${{ matrix.version }}-${{ github.sha }}

      - name: Alias :standalone -> :standalone-latest
        if: matrix.version == 'latest'
        run: |
          docker buildx imagetools create -t ${{ env.IMAGE_PREFIX }}:standalone \
            ${{ env.IMAGE_PREFIX }}:standalone-latest-${{ github.sha }}

  build-buildkit:
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write

    # Both :drupal10 and :wordpress are built from images/buildkit; the only
    # difference is DEFAULT_SITE_TYPE, which sets the civibuild site type the
    # entrypoint creates on first run.
    strategy:
      matrix:
        variant:
          - { name: drupal10,  site_type: drupal10-demo }
          - { name: wordpress, site_type: wp-demo }
        php: ['8.3']
        platform:
          - linux/arm64
          - linux/amd64
        include:
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            suffix: arm64
          - platform: linux/amd64
            runner: ubuntu-24.04
            suffix: amd64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Test-then-promote: only sha-suffixed candidate tags here; the stable
      # tags (:drupal10, :wordpress, :*-php8.3) are created by promote-buildkit
      # after the smoke tests pass.
      - name: Build and push ${{ matrix.variant.name }} candidate image
        uses: docker/build-push-action@v5
        with:
          context: images
          file: images/buildkit/Dockerfile
          target: final
          platforms: ${{ matrix.platform }}
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}:${{ matrix.variant.name }}-${{ github.sha }}-${{ matrix.suffix }}
          build-args: |
            PHP_VERSION=${{ matrix.php }}
            DEFAULT_SITE_TYPE=${{ matrix.variant.site_type }}
          cache-from: type=gha,scope=buildkit-${{ matrix.php }}-${{ matrix.suffix }}
          cache-to: type=gha,mode=max,scope=buildkit-${{ matrix.php }}-${{ matrix.suffix }}

  merge-buildkit:
    needs: build-buildkit
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        variant: [drupal10, wordpress]

    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-platform candidate manifest
        run: |
          docker buildx imagetools create -t ${{ env.IMAGE_PREFIX }}:${{ matrix.variant }}-${{ github.sha }} \
            ${{ env.IMAGE_PREFIX }}:${{ matrix.variant }}-${{ github.sha }}-arm64 \
            ${{ env.IMAGE_PREFIX }}:${{ matrix.variant }}-${{ github.sha }}-amd64

  smoke-test-buildkit:
    needs: merge-buildkit
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: read

    strategy:
      matrix:
        variant: [drupal10, wordpress]
        include:
          - platform: linux/amd64
            runner: ubuntu-24.04

    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout (for the test scripts)
        uses: actions/checkout@v4

      - name: Functional test of bundled dev tools
        run: |
          IMG=${{ env.IMAGE_PREFIX }}:${{ matrix.variant }}-${{ github.sha }}
          docker pull --platform ${{ matrix.platform }} "$IMG"
          docker run --rm --platform ${{ matrix.platform }} \
            -v "${{ github.workspace }}/images/test:/civikitchen-test:ro" \
            --entrypoint='' \
            "$IMG" \
            bash /civikitchen-test/test-dev-tools.sh

      - name: Boot test (real first-boot path against an external DB)
        run: |
          case "${{ matrix.variant }}" in
            drupal10)  SITE_TYPE=drupal10-demo ;;
            wordpress) SITE_TYPE=wp-demo ;;
          esac
          bash images/test/boot-test.sh ${{ env.IMAGE_PREFIX }}:${{ matrix.variant }}-${{ github.sha }} "$SITE_TYPE"

  promote-buildkit:
    # Stable tags only move once the candidate passed the smoke tests.
    needs: smoke-test-buildkit
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        variant: [drupal10, wordpress]
        php: ['8.3']

    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Promote tested candidate to stable tags
        run: |
          docker buildx imagetools create -t ${{ env.IMAGE_PREFIX }}:${{ matrix.variant }} \
            ${{ env.IMAGE_PREFIX }}:${{ matrix.variant }}-${{ github.sha }}
          docker buildx imagetools create -t ${{ env.IMAGE_PREFIX }}:${{ matrix.variant }}-php${{ matrix.php }} \
            ${{ env.IMAGE_PREFIX }}:${{ matrix.variant }}-${{ github.sha }}

  build-demo:
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write

    # Single-container demo images (embedded MariaDB, baked demo data) from the
    # same images/buildkit/Dockerfile `demo` target. Profiles (e.g. verein) are
    # no longer baked into a separate image — they apply at first boot via
    # CIVIKITCHEN_PROFILE, so there is exactly one demo image per CMS flavor.
    strategy:
      matrix:
        variant:
          - { name: standalone-demo, site_type: standalone-demo }
          - { name: drupal10-demo,   site_type: drupal10-demo }
          - { name: wordpress-demo,  site_type: wp-demo }
        platform:
          - linux/arm64
          - linux/amd64
        include:
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            suffix: arm64
          - platform: linux/amd64
            runner: ubuntu-24.04
            suffix: amd64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Test-then-promote: only sha-suffixed candidate tags here; the stable
      # demo tags are created by promote-demo after the smoke tests pass.
      - name: Build and push ${{ matrix.variant.name }} demo candidate image
        uses: docker/build-push-action@v5
        with:
          context: images
          file: images/buildkit/Dockerfile
          target: demo
          platforms: ${{ matrix.platform }}
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}:${{ matrix.variant.name }}-${{ github.sha }}-${{ matrix.suffix }}
          build-args: |
            DEFAULT_SITE_TYPE=${{ matrix.variant.site_type }}
          cache-from: type=gha,scope=demo-${{ matrix.variant.name }}-${{ matrix.suffix }}
          cache-to: type=gha,mode=max,scope=demo-${{ matrix.variant.name }}-${{ matrix.suffix }}

  merge-demo:
    needs: build-demo
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        tag: [standalone-demo, drupal10-demo, wordpress-demo]

    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-platform candidate manifest
        run: |
          IMG=${{ env.IMAGE_PREFIX }}:${{ matrix.tag }}-${{ github.sha }}
          docker buildx imagetools create -t "$IMG" "$IMG-arm64" "$IMG-amd64"

  smoke-test-demo:
    needs: merge-demo
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: read

    # The drupal10-demo + profile legs exercise the runtime profile path:
    # first boot installs the profile extensions and seeds demo data.
    strategy:
      matrix:
        variant:
          - { tag: standalone-demo, profile: '' }
          - { tag: drupal10-demo,   profile: '' }
          - { tag: drupal10-demo,   profile: verein }
          - { tag: drupal10-demo,   profile: fundraising }
          - { tag: drupal10-demo,   profile: events }
          - { tag: drupal10-demo,   profile: mailing }
          - { tag: wordpress-demo,  profile: '' }

    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout (for the test script)
        uses: actions/checkout@v4

      - name: Boot test (single-container demo)
        run: |
          IMG=${{ env.IMAGE_PREFIX }}:${{ matrix.variant.tag }}-${{ github.sha }}
          docker pull "$IMG"
          bash images/test/boot-test-demo.sh "$IMG" ${{ matrix.variant.profile }}

  promote-demo:
    # Stable demo tags only move once the candidates passed the smoke tests
    # (including the runtime verein profile leg).
    needs: smoke-test-demo
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        tag: [standalone-demo, drupal10-demo, wordpress-demo]

    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Promote tested candidate to stable tag
        run: |
          docker buildx imagetools create -t ${{ env.IMAGE_PREFIX }}:${{ matrix.tag }} \
            ${{ env.IMAGE_PREFIX }}:${{ matrix.tag }}-${{ github.sha }}
