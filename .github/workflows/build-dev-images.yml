name: Build Dev Images

on:
  push:
    branches: [main]
    paths:
      - 'images/**'
  schedule:
    # Weekly: pick up upstream civicrm/civicrm image updates
    - cron: '0 6 * * 1'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/civicrm-dev

jobs:
  build-standalone:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push standalone image
        uses: docker/build-push-action@v5
        with:
          context: images/standalone
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}:standalone
            ${{ env.IMAGE_PREFIX }}:standalone-${{ github.sha }}
          cache-from: type=gha,scope=standalone
          cache-to: type=gha,mode=max,scope=standalone

      - name: Smoke test standalone image
        run: |
          docker pull ${{ env.IMAGE_PREFIX }}:standalone
          # Verify dev tools are installed
          docker run --rm ${{ env.IMAGE_PREFIX }}:standalone phpunit --version
          docker run --rm ${{ env.IMAGE_PREFIX }}:standalone phpstan --version
          docker run --rm ${{ env.IMAGE_PREFIX }}:standalone civix --version

  build-buildkit:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        variant: [drupal10, wordpress]
        php: ['8.3']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.variant }} image
        uses: docker/build-push-action@v5
        with:
          context: images/${{ matrix.variant }}
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}:${{ matrix.variant }}
            ${{ env.IMAGE_PREFIX }}:${{ matrix.variant }}-php${{ matrix.php }}
          build-args: |
            PHP_VERSION=${{ matrix.php }}
          cache-from: type=gha,scope=${{ matrix.variant }}-${{ matrix.php }}
          cache-to: type=gha,mode=max,scope=${{ matrix.variant }}-${{ matrix.php }}
