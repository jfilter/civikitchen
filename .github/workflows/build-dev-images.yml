name: Build Dev Images

on:
  push:
    branches: [main]
    paths:
      - 'images/**'
      - '.github/workflows/build-dev-images.yml'
  schedule:
    # Weekly (Mondays 04:00 UTC, an hour before the GHCR cleanup cron): the
    # resolve-civicrm job picks up the current upstream stable release each
    # run, so a new CiviCRM patch/minor is at most a week away. Unchanged
    # weeks are cheap (full layer-cache hit) and still refresh base-image
    # security patches.
    - cron: '0 4 * * 1'
  workflow_dispatch:
    inputs:
      extra_standalone_minors:
        description: >-
          Extra standalone minors to build alongside the current stable
          (comma-separated, e.g. "6.12"). For downstreams pinned to an older
          minor: its :standalone-<minor> tag freezes once upstream moves on,
          so image/tooling changes never reach it without an explicit rebuild.
        required: false
        default: ''

env:
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/civikitchen

jobs:
  resolve-civicrm:
    # Single source of truth for the CiviCRM version every image bakes.
    # latest.civicrm.org/stable.php returns the current stable (e.g. 6.15.1);
    # buildkit/demo pin that exact version, standalone tracks its minor.
    runs-on: ubuntu-24.04
    outputs:
      stable: ${{ steps.resolve.outputs.stable }}
      minor: ${{ steps.resolve.outputs.minor }}
      standalone_versions: ${{ steps.resolve.outputs.standalone_versions }}
    steps:
      - name: Resolve current CiviCRM stable
        id: resolve
        env:
          # Empty on push/schedule; only workflow_dispatch can request extras.
          EXTRA_MINORS: ${{ inputs.extra_standalone_minors }}
        run: |
          STABLE=$(curl -fsS https://latest.civicrm.org/stable.php)
          echo "upstream stable: ${STABLE}"
          if ! [[ "${STABLE}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "unexpected version string from stable.php: '${STABLE}'" >&2
            exit 1
          fi
          MINOR=${STABLE%.*}
          # Requested extra minors flow through the whole standalone chain
          # (build → merge → smoke → e2e → promote) via this one array.
          VERSIONS="[\"latest\",\"${MINOR}\""
          IFS=',' read -ra EXTRAS <<< "${EXTRA_MINORS}"
          for v in "${EXTRAS[@]}"; do
            v="${v// /}"
            [ -z "${v}" ] && continue
            if ! [[ "${v}" =~ ^[0-9]+\.[0-9]+$ ]]; then
              echo "invalid extra standalone minor: '${v}'" >&2
              exit 1
            fi
            [ "${v}" = "${MINOR}" ] && continue
            VERSIONS="${VERSIONS},\"${v}\""
          done
          VERSIONS="${VERSIONS}]"
          echo "standalone versions: ${VERSIONS}"
          {
            echo "stable=${STABLE}"
            echo "minor=${MINOR}"
            echo "standalone_versions=${VERSIONS}"
          } >> "$GITHUB_OUTPUT"

  build-standalone:
    needs: resolve-civicrm
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        version: ${{ fromJSON(needs.resolve-civicrm.outputs.standalone_versions) }}
        arch: [arm64, amd64]
        include:
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Test-then-promote: builds push only sha-suffixed candidate tags. The
      # stable tags (:standalone, :standalone-latest, ...) are created by
      # promote-standalone AFTER the smoke + e2e tests pass, so a broken image
      # never goes live under a stable tag.
      - name: Build and push standalone candidate image
        uses: docker/build-push-action@v7
        with:
          context: images
          file: images/standalone/Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          build-args: |
            CIVICRM_VERSION=${{ matrix.version }}
          tags: |
            ${{ env.IMAGE_PREFIX }}:standalone-${{ matrix.version }}-${{ github.sha }}-${{ matrix.arch }}
          cache-from: type=gha,scope=standalone-${{ matrix.version }}-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=standalone-${{ matrix.version }}-${{ matrix.arch }}

  merge-standalone:
    needs: [resolve-civicrm, build-standalone]
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        version: ${{ fromJSON(needs.resolve-civicrm.outputs.standalone_versions) }}

    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-platform candidate manifest
        run: |
          docker buildx imagetools create -t ${{ env.IMAGE_PREFIX }}:standalone-${{ matrix.version }}-${{ github.sha }} \
            ${{ env.IMAGE_PREFIX }}:standalone-${{ matrix.version }}-${{ github.sha }}-arm64 \
            ${{ env.IMAGE_PREFIX }}:standalone-${{ matrix.version }}-${{ github.sha }}-amd64

  smoke-test-standalone:
    needs: [resolve-civicrm, merge-standalone]
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: read

    strategy:
      matrix:
        version: ${{ fromJSON(needs.resolve-civicrm.outputs.standalone_versions) }}
        platform: [linux/arm64, linux/amd64]
        include:
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
          - platform: linux/amd64
            runner: ubuntu-24.04

    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout (for the dev-tools test script)
        uses: actions/checkout@v5

      - name: Functional test of bundled dev tools
        run: |
          IMG=${{ env.IMAGE_PREFIX }}:standalone-${{ matrix.version }}-${{ github.sha }}
          docker pull --platform ${{ matrix.platform }} "$IMG"
          docker run --rm --platform ${{ matrix.platform }} \
            -v "${{ github.workspace }}/images/test:/civikitchen-test:ro" \
            --entrypoint='' \
            "$IMG" \
            bash /civikitchen-test/test-dev-tools.sh

  e2e-test-standalone:
    # Runs the example compose stack and exercises the auto-installed site
    # with Playwright (real Chromium). Catches install/Apache/SITE_URL bugs
    # the in-image functional test can't see.
    needs: smoke-test-standalone
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # The example compose uses `image: ${IMAGE:-…default}` so we point it
      # at this run's candidate tag (stable tags don't exist yet at this point).
      - name: Boot the example stack
        env:
          IMAGE: ${{ env.IMAGE_PREFIX }}:standalone-latest-${{ github.sha }}
          # Exercise the CIVIKITCHEN_EXTRA_EXTENSIONS entrypoint hook with both
          # supported syntaxes:
          # - bare key (mjwshared): pulled from the public registry, exercises
          #   ext:download's network + cache refresh path.
          # - key@URL (de.systopia.xcm): exercises the explicit-URL path. This
          #   one previously regressed because cv ext:download auto-installs
          #   and bombed with "Cannot install or enable extension"; the
          #   entrypoint now splits download (--no-install) + enable.
          CIVIKITCHEN_EXTRA_EXTENSIONS: "mjwshared,de.systopia.xcm@https://github.com/systopia/de.systopia.xcm/releases/download/1.13.0/de.systopia.xcm-1.13.0.zip"
        run: |
          docker compose -f examples/standalone/docker-compose.yml up -d --pull always

      - name: Wait for CiviCRM to install + boot
        run: |
          for _ in $(seq 1 60); do
            if curl -fs http://localhost:8080/civicrm/login >/dev/null; then
              echo "ready"
              exit 0
            fi
            sleep 3
          done
          echo "site never became reachable" >&2
          docker compose -f examples/standalone/docker-compose.yml logs app
          exit 1

      - name: Verify CIVIKITCHEN_EXTRA_EXTENSIONS got installed
        run: |
          # Both the bare-key (mjwshared) and key@URL (de.systopia.xcm)
          # entries from CIVIKITCHEN_EXTRA_EXTENSIONS must end up installed.
          for key in mjwshared de.systopia.xcm; do
            status=$(docker compose -f examples/standalone/docker-compose.yml exec -T app \
              runuser -u www-data -- cv api4 Extension.get \
              "{\"where\":[[\"key\",\"=\",\"${key}\"]],\"select\":[\"status\"]}" \
              --out=json)
            echo "${key}: ${status}"
            echo "$status" | grep -Eq '"status"[[:space:]]*:[[:space:]]*"installed"' \
              || { echo "FAIL: ${key} not installed" >&2; exit 1; }
          done

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Playwright + Chromium
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Run Playwright e2e
        env:
          CIVICRM_BASE_URL: http://localhost:8080
        run: npx playwright test

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: App container logs on failure
        if: failure()
        run: docker compose -f examples/standalone/docker-compose.yml logs app

      - name: Tear down
        if: always()
        run: docker compose -f examples/standalone/docker-compose.yml down -v

  promote-standalone:
    # Stable tags only move once the candidate passed smoke + e2e.
    # `imagetools create` from an existing manifest list copies it intact,
    # so the promoted tag stays multi-arch.
    needs: [resolve-civicrm, smoke-test-standalone, e2e-test-standalone]
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        version: ${{ fromJSON(needs.resolve-civicrm.outputs.standalone_versions) }}

    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Promote tested candidate to stable tags
        run: |
          docker buildx imagetools create -t ${{ env.IMAGE_PREFIX }}:standalone-${{ matrix.version }} \
            ${{ env.IMAGE_PREFIX }}:standalone-${{ matrix.version }}-${{ github.sha }}

      - name: Alias :standalone -> :standalone-latest
        if: matrix.version == 'latest'
        run: |
          docker buildx imagetools create -t ${{ env.IMAGE_PREFIX }}:standalone \
            ${{ env.IMAGE_PREFIX }}:standalone-latest-${{ github.sha }}

  build-buildkit:
    needs: resolve-civicrm
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write

    # Buildkit-backed CMS dev images. They all share images/buildkit; the only
    # difference is DEFAULT_SITE_TYPE, which sets the civibuild site type the
    # entrypoint creates on first run.
    strategy:
      matrix:
        variant:
          - { name: drupal10,  site_type: drupal10-demo }
          - { name: drupal11,  site_type: drupal11-demo }
          - { name: wordpress, site_type: wp-demo }
          - { name: joomla,    site_type: joomla-demo }
        php: ['8.3']
        platform:
          - linux/arm64
          - linux/amd64
        include:
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            suffix: arm64
          - platform: linux/amd64
            runner: ubuntu-24.04
            suffix: amd64

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Test-then-promote: only sha-suffixed candidate tags here; the stable
      # tags (:drupal10, :drupal11, :wordpress, :joomla, :*-php8.3) are
      # created by promote-buildkit after the smoke tests pass.
      - name: Build and push ${{ matrix.variant.name }} candidate image
        uses: docker/build-push-action@v7
        with:
          context: images
          file: images/buildkit/Dockerfile
          target: final
          platforms: ${{ matrix.platform }}
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}:${{ matrix.variant.name }}-${{ github.sha }}-${{ matrix.suffix }}
          build-args: |
            PHP_VERSION=${{ matrix.php }}
            DEFAULT_SITE_TYPE=${{ matrix.variant.site_type }}
            CIVICRM_VERSION=${{ needs.resolve-civicrm.outputs.stable }}
            CIVICRM_BUILD_VERSION=${{ needs.resolve-civicrm.outputs.minor }}
          cache-from: type=gha,scope=buildkit-${{ matrix.php }}-${{ matrix.suffix }}
          cache-to: type=gha,mode=max,scope=buildkit-${{ matrix.php }}-${{ matrix.suffix }}

  merge-buildkit:
    needs: build-buildkit
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        variant: [drupal10, drupal11, wordpress, joomla]

    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-platform candidate manifest
        run: |
          docker buildx imagetools create -t ${{ env.IMAGE_PREFIX }}:${{ matrix.variant }}-${{ github.sha }} \
            ${{ env.IMAGE_PREFIX }}:${{ matrix.variant }}-${{ github.sha }}-arm64 \
            ${{ env.IMAGE_PREFIX }}:${{ matrix.variant }}-${{ github.sha }}-amd64

  smoke-test-buildkit:
    needs: merge-buildkit
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: read

    strategy:
      matrix:
        variant: [drupal10, drupal11, wordpress, joomla]
        include:
          - platform: linux/amd64
            runner: ubuntu-24.04

    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout (for the test scripts)
        uses: actions/checkout@v5

      - name: Functional test of bundled dev tools
        run: |
          IMG=${{ env.IMAGE_PREFIX }}:${{ matrix.variant }}-${{ github.sha }}
          docker pull --platform ${{ matrix.platform }} "$IMG"
          docker run --rm --platform ${{ matrix.platform }} \
            -v "${{ github.workspace }}/images/test:/civikitchen-test:ro" \
            --entrypoint='' \
            "$IMG" \
            bash /civikitchen-test/test-dev-tools.sh

      - name: Boot test (real first-boot path against an external DB)
        run: |
          case "${{ matrix.variant }}" in
            drupal10)  SITE_TYPE=drupal10-demo ;;
            drupal11)  SITE_TYPE=drupal11-demo ;;
            wordpress) SITE_TYPE=wp-demo ;;
            joomla)    SITE_TYPE=joomla-demo ;;
          esac
          bash images/test/boot-test.sh ${{ env.IMAGE_PREFIX }}:${{ matrix.variant }}-${{ github.sha }} "$SITE_TYPE"

  e2e-test-buildkit:
    # Runs each CMS example compose stack with the candidate image and exercises
    # it in real Chromium. This complements boot-test.sh's cv/API assertions by
    # catching browser-visible Apache/SITE_URL/asset failures.
    needs: smoke-test-buildkit
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: read

    strategy:
      matrix:
        variant:
          - { name: drupal10,  compose: examples/drupal10/docker-compose.yml,  path: "/civicrm" }
          - { name: drupal11,  compose: examples/drupal11/docker-compose.yml,  path: "/civicrm" }
          - { name: wordpress, compose: examples/wordpress/docker-compose.yml, path: "/wp-admin/admin.php?page=CiviCRM" }
          - { name: joomla,    compose: examples/joomla/docker-compose.yml,   path: "/administrator/index.php?option=com_civicrm" }

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Boot the example stack
        env:
          IMAGE: ${{ env.IMAGE_PREFIX }}:${{ matrix.variant.name }}-${{ github.sha }}
        run: |
          docker compose -f ${{ matrix.variant.compose }} up -d --pull always

      - name: Wait for the app healthcheck
        run: |
          for _ in $(seq 1 120); do
            cid=$(docker compose -f ${{ matrix.variant.compose }} ps -q app)
            health=$(docker inspect -f '{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' "$cid" 2>/dev/null || echo starting)
            if [ "$health" = healthy ]; then
              echo "ready"
              exit 0
            fi
            if [ "$health" = exited ] || [ "$health" = unhealthy ]; then
              echo "container became ${health}" >&2
              docker compose -f ${{ matrix.variant.compose }} logs app
              exit 1
            fi
            sleep 5
          done
          echo "site never became healthy" >&2
          docker compose -f ${{ matrix.variant.compose }} logs civicrm
          exit 1

      - name: Verify CiviCRM responds
        # cv works on every flavor including Joomla (the buildkit image ships the
        # joomla-cli-bootstrap.php settings.d shim), so no Joomla DB-direct case.
        run: |
          docker compose -f ${{ matrix.variant.compose }} exec -T \
            -u buildkit \
            -w /home/buildkit/buildkit/build/site/web \
            civicrm \
            bash -lc 'export PATH=/home/buildkit/buildkit/bin:$PATH; cv api4 Domain.get +s version'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Playwright + Chromium
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Run Playwright e2e
        env:
          CIVIKITCHEN_E2E_TARGET: ${{ matrix.variant.name }}
          CIVICRM_BASE_URL: http://localhost:8080
          CIVICRM_E2E_PATH: ${{ matrix.variant.path }}
        run: npx playwright test

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-buildkit-${{ matrix.variant.name }}
          path: playwright-report/
          retention-days: 7

      - name: App container logs on failure
        if: failure()
        run: docker compose -f ${{ matrix.variant.compose }} logs civicrm

      - name: Tear down
        if: always()
        run: docker compose -f ${{ matrix.variant.compose }} down -v

  promote-buildkit:
    # Stable tags only move once the candidate passed smoke + e2e.
    needs: e2e-test-buildkit
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        variant: [drupal10, drupal11, wordpress, joomla]
        php: ['8.3']

    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Promote tested candidate to stable tags
        run: |
          docker buildx imagetools create -t ${{ env.IMAGE_PREFIX }}:${{ matrix.variant }} \
            ${{ env.IMAGE_PREFIX }}:${{ matrix.variant }}-${{ github.sha }}
          docker buildx imagetools create -t ${{ env.IMAGE_PREFIX }}:${{ matrix.variant }}-php${{ matrix.php }} \
            ${{ env.IMAGE_PREFIX }}:${{ matrix.variant }}-${{ github.sha }}

  build-demo:
    needs: resolve-civicrm
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write

    # Single-container demo images (embedded MariaDB, baked demo data) from the
    # same images/buildkit/Dockerfile `demo` target. Profiles (e.g. verein) are
    # no longer baked into a separate image — they apply at first boot via
    # CIVIKITCHEN_PROFILE, so there is exactly one demo image per supported
    # demo flavor.
    #
    # joomla-demo has the same profile support as the others: the bake finishes
    # civibuild's deliberately-incomplete joomla-demo install (it leaves the
    # Joomla component registration as a commented-out "#fixme" and enables only
    # civi_contribute) by registering CiviCRM's Joomla plugins and enabling the
    # standard component extensions. The one difference is that authx's
    # password/basic-auth flow doesn't work on Joomla, so its profile boot test
    # exercises the api_key credential only.
    #
    # drupal11-demo uses a site type civibuild doesn't ship: CiviKitchen
    # vendors it in images/buildkit/site-types/drupal11-demo/ (drupal10-demo's
    # recipe with the Drupal 11.4 adaptations documented there); bake.sh
    # installs it into the buildkit clone before `civibuild create`.
    strategy:
      matrix:
        variant:
          - { name: standalone-demo, site_type: standalone-demo }
          - { name: drupal10-demo,   site_type: drupal10-demo }
          - { name: drupal11-demo,   site_type: drupal11-demo }
          - { name: wordpress-demo,  site_type: wp-demo }
          - { name: joomla-demo,     site_type: joomla-demo }
        platform:
          - linux/arm64
          - linux/amd64
        include:
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            suffix: arm64
          - platform: linux/amd64
            runner: ubuntu-24.04
            suffix: amd64

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Test-then-promote: only sha-suffixed candidate tags here; the stable
      # demo tags are created by promote-demo after the smoke tests pass.
      - name: Build and push ${{ matrix.variant.name }} demo candidate image
        uses: docker/build-push-action@v7
        with:
          context: images
          file: images/buildkit/Dockerfile
          target: demo
          platforms: ${{ matrix.platform }}
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}:${{ matrix.variant.name }}-${{ github.sha }}-${{ matrix.suffix }}
          build-args: |
            DEFAULT_SITE_TYPE=${{ matrix.variant.site_type }}
            CIVICRM_VERSION=${{ needs.resolve-civicrm.outputs.stable }}
            CIVICRM_BUILD_VERSION=${{ needs.resolve-civicrm.outputs.minor }}
          cache-from: type=gha,scope=demo-${{ matrix.variant.name }}-${{ matrix.suffix }}
          cache-to: type=gha,mode=max,scope=demo-${{ matrix.variant.name }}-${{ matrix.suffix }}

  merge-demo:
    needs: build-demo
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        tag: [standalone-demo, drupal10-demo, drupal11-demo, wordpress-demo, joomla-demo]

    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-platform candidate manifest
        run: |
          IMG=${{ env.IMAGE_PREFIX }}:${{ matrix.tag }}-${{ github.sha }}
          docker buildx imagetools create -t "$IMG" "$IMG-arm64" "$IMG-amd64"

  smoke-test-demo:
    needs: merge-demo
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: read

    # The profile legs exercise the runtime profile path on every flavor:
    # first boot installs the profile extensions, seeds demo data, and
    # creates API users (drush / wp-cli / standaloneusers APIs, per CMS).
    strategy:
      matrix:
        variant:
          - { tag: standalone-demo, profile: '' }
          - { tag: standalone-demo, profile: verein }
          - { tag: standalone-demo, profile: fundraising }
          - { tag: standalone-demo, profile: events }
          - { tag: standalone-demo, profile: mailing }
          - { tag: drupal10-demo,   profile: '' }
          - { tag: drupal10-demo,   profile: verein }
          - { tag: drupal10-demo,   profile: fundraising }
          - { tag: drupal10-demo,   profile: events }
          - { tag: drupal10-demo,   profile: mailing }
          - { tag: drupal11-demo,   profile: '' }
          - { tag: drupal11-demo,   profile: verein }
          - { tag: drupal11-demo,   profile: fundraising }
          - { tag: drupal11-demo,   profile: events }
          - { tag: drupal11-demo,   profile: mailing }
          - { tag: wordpress-demo,  profile: '' }
          - { tag: wordpress-demo,  profile: verein }
          - { tag: wordpress-demo,  profile: fundraising }
          - { tag: wordpress-demo,  profile: events }
          - { tag: wordpress-demo,  profile: mailing }
          - { tag: joomla-demo,     profile: '' }
          - { tag: joomla-demo,     profile: verein }
          - { tag: joomla-demo,     profile: fundraising }
          - { tag: joomla-demo,     profile: events }
          - { tag: joomla-demo,     profile: mailing }

    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout (for the test script)
        uses: actions/checkout@v5

      - name: Boot test (single-container demo)
        run: |
          IMG=${{ env.IMAGE_PREFIX }}:${{ matrix.variant.tag }}-${{ github.sha }}
          docker pull "$IMG"
          bash images/test/boot-test-demo.sh "$IMG" ${{ matrix.variant.profile }}

  promote-demo:
    # Stable demo tags only move once the candidates passed the smoke tests
    # (including the runtime profile legs on all tested demo flavors).
    needs: smoke-test-demo
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        tag: [standalone-demo, drupal10-demo, drupal11-demo, wordpress-demo, joomla-demo]

    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Promote tested candidate to stable tag
        run: |
          docker buildx imagetools create -t ${{ env.IMAGE_PREFIX }}:${{ matrix.tag }} \
            ${{ env.IMAGE_PREFIX }}:${{ matrix.tag }}-${{ github.sha }}

  notify-scheduled-failure:
    # The weekly cron rebuild fails SILENTLY otherwise: test-then-promote
    # keeps serving the last good stable tags, so nothing user-visible breaks
    # and a broken pipeline can go unnoticed for weeks. Open (or bump) an
    # issue so the failure has a place to be seen. failure() is transitive
    # over the needs chain, so any failed job anywhere in the pipeline
    # triggers this — push-triggered runs are excluded (those failures are
    # visible on the commit/PR already).
    needs: [promote-standalone, promote-buildkit, promote-demo]
    if: github.event_name == 'schedule' && failure()
    runs-on: ubuntu-24.04
    permissions:
      issues: write

    steps:
      - name: Open or bump the scheduled-build-failure issue
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          run_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          gh label create ci-scheduled-failure --repo "$REPO" \
            --description "Weekly image rebuild failed" --color B60205 2>/dev/null || true
          existing=$(gh issue list --repo "$REPO" --label ci-scheduled-failure \
            --state open --json number --jq '.[0].number // empty')
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --repo "$REPO" \
              --body "The scheduled image build failed again: $run_url"
          else
            gh issue create --repo "$REPO" --label ci-scheduled-failure \
              --title "Scheduled image build is failing" \
              --body "$(printf 'The weekly image rebuild failed: %s\n\nThe stable tags keep serving the last good images (test-then-promote), but no new CiviCRM release reaches users until this is fixed.' "$run_url")"
          fi
