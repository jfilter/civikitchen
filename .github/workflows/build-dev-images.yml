name: Build Dev Images

on:
  push:
    branches: [main]
    paths:
      - 'images/**'
  schedule:
    # Weekly: pick up upstream civicrm/civicrm image updates
    - cron: '0 6 * * 1'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/civicrm-dev

jobs:
  build-standalone:
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        version: [latest, '6.12.1']
        arch: [arm64, amd64]
        include:
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push standalone image
        uses: docker/build-push-action@v5
        with:
          context: images/standalone
          platforms: ${{ matrix.platform }}
          push: true
          build-args: |
            CIVICRM_VERSION=${{ matrix.version }}
          tags: |
            ${{ env.IMAGE_PREFIX }}:standalone-${{ matrix.version }}-${{ matrix.arch }}
            ${{ env.IMAGE_PREFIX }}:standalone-${{ matrix.version }}-${{ github.sha }}-${{ matrix.arch }}
          cache-from: type=gha,scope=standalone-${{ matrix.version }}-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=standalone-${{ matrix.version }}-${{ matrix.arch }}

  merge-standalone:
    needs: build-standalone
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        version: [latest, '6.12.1']

    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-platform manifest for version
        run: |
          docker buildx imagetools create -t ${{ env.IMAGE_PREFIX }}:standalone-${{ matrix.version }} \
            ${{ env.IMAGE_PREFIX }}:standalone-${{ matrix.version }}-arm64 \
            ${{ env.IMAGE_PREFIX }}:standalone-${{ matrix.version }}-amd64
          docker buildx imagetools create -t ${{ env.IMAGE_PREFIX }}:standalone-${{ matrix.version }}-${{ github.sha }} \
            ${{ env.IMAGE_PREFIX }}:standalone-${{ matrix.version }}-${{ github.sha }}-arm64 \
            ${{ env.IMAGE_PREFIX }}:standalone-${{ matrix.version }}-${{ github.sha }}-amd64

      - name: Alias :standalone -> :standalone-latest
        if: matrix.version == 'latest'
        run: |
          docker buildx imagetools create -t ${{ env.IMAGE_PREFIX }}:standalone \
            ${{ env.IMAGE_PREFIX }}:standalone-latest

  smoke-test-standalone:
    needs: merge-standalone
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: read

    strategy:
      matrix:
        include:
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
          - platform: linux/amd64
            runner: ubuntu-24.04

    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Smoke test standalone image
        run: |
          docker pull --platform ${{ matrix.platform }} ${{ env.IMAGE_PREFIX }}:standalone
          docker run --rm --platform ${{ matrix.platform }} ${{ env.IMAGE_PREFIX }}:standalone phpunit --version
          docker run --rm --platform ${{ matrix.platform }} ${{ env.IMAGE_PREFIX }}:standalone phpstan --version
          docker run --rm --platform ${{ matrix.platform }} ${{ env.IMAGE_PREFIX }}:standalone civix --version

  build-buildkit:
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        variant: [drupal10, wordpress]
        php: ['8.3']
        platform:
          - linux/arm64
          - linux/amd64
        include:
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            suffix: arm64
          - platform: linux/amd64
            runner: ubuntu-24.04
            suffix: amd64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.variant }} image
        uses: docker/build-push-action@v5
        with:
          context: images/${{ matrix.variant }}
          platforms: ${{ matrix.platform }}
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}:${{ matrix.variant }}-${{ matrix.suffix }}
            ${{ env.IMAGE_PREFIX }}:${{ matrix.variant }}-php${{ matrix.php }}-${{ matrix.suffix }}
          build-args: |
            PHP_VERSION=${{ matrix.php }}
          cache-from: type=gha,scope=${{ matrix.variant }}-${{ matrix.php }}-${{ matrix.suffix }}
          cache-to: type=gha,mode=max,scope=${{ matrix.variant }}-${{ matrix.php }}-${{ matrix.suffix }}

  merge-buildkit:
    needs: build-buildkit
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        variant: [drupal10, wordpress]
        php: ['8.3']

    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-platform manifests
        run: |
          docker buildx imagetools create -t ${{ env.IMAGE_PREFIX }}:${{ matrix.variant }} \
            ${{ env.IMAGE_PREFIX }}:${{ matrix.variant }}-arm64 \
            ${{ env.IMAGE_PREFIX }}:${{ matrix.variant }}-amd64
          docker buildx imagetools create -t ${{ env.IMAGE_PREFIX }}:${{ matrix.variant }}-php${{ matrix.php }} \
            ${{ env.IMAGE_PREFIX }}:${{ matrix.variant }}-php${{ matrix.php }}-arm64 \
            ${{ env.IMAGE_PREFIX }}:${{ matrix.variant }}-php${{ matrix.php }}-amd64
