# Static checks for everything that has no compiler: shell scripts (strict
# shellcheck, style level), workflow files (actionlint, which also shellchecks
# embedded run blocks), PHP syntax for seeds/scripts, and profile.json shape.
# Runs on every push/PR — fast, no Docker, no build dependency.
name: Lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: shellcheck (style level, fails on any finding)
        run: |
          find images examples -name '*.sh' -print0 | xargs -0 shellcheck -S style
          echo "shellcheck clean"

      - name: actionlint
        run: |
          bash <(curl -fsSL https://raw.githubusercontent.com/rhysd/actionlint/v1.7.7/scripts/download-actionlint.bash) 1.7.7 .
          ./actionlint -color

      - name: php -l (seeds + profile scripts)
        run: |
          rc=0
          while IFS= read -r -d '' f; do
            php -l "$f" >/dev/null || rc=1
          done < <(find images -name '*.php' -print0)
          [ "$rc" = 0 ] && echo "php syntax clean"

      # ckconform is the tool that tells eleven repos what is wrong with them,
      # and its 213 fixture tests ran nowhere but on a laptop. Most of its
      # checks are silent on success, so a rule that quietly stops matching
      # looks exactly like a clean repo — the tests are the only thing that
      # tells the difference. It has no composer dependencies, hence the phar.
      - name: ckconform test suite
        run: |
          curl -fsSLo /tmp/phpunit.phar https://phar.phpunit.de/phpunit-9.6.35.phar
          php /tmp/phpunit.phar -c images/ckconform/phpunit.xml.dist

      - name: profile.json valid against schema
        # packages/civicrm-profile-schema/profile.schema.json is the canonical spec
        # for the profile format (draft 2020-12), published as @jfilter/civicrm-
        # profile-schema. It subsumes the old jq shape checks (description,
        # dependencies array, skipUf CIVICRM_UF enum) and adds real ones a key-blind
        # jq filter can't: additionalProperties:false catches typos (skipUF), repo/
        # registry are mutually exclusive, and version only pins a git `repo`.
        run: |
          pipx run check-jsonschema \
            --schemafile packages/civicrm-profile-schema/profile.schema.json \
            images/profiles/*/profile.json
